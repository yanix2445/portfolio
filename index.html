<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site en Construction</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <audio id="background-music" autoplay loop>
    <source src="tech-music.mp3" type="audio/mp3">
  </audio>

  <div class="container">
    <canvas id="particles"></canvas>

    <h1 class="title">🚀 Site en Construction...</h1>
    <p class="subtitle">Prépare-toi, on arrive bientôt avec quelque chose de *fou*! 🤖</p>
    
    <div class="loader"></div>
    <p class="countdown">Lancement dans <span id="countdown-timer">10</span> secondes... ⏳</p>
    <p class="hint">Reste connecté : chaque seconde compte... 👾</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
